<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - YourSlave</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}
:root {
  --bg: #0a0a1a;
  --text: #e0e0ff;
  --accent: #aa00ff;
  --cell-bg: #1a1a2e;
  --grid-bg: #12121f;
  --overlay-bg: rgba(10,10,26,0.92);
}
body.light {
  --bg: #f0f0f5;
  --text: #1a1a2e;
  --accent: #7700cc;
  --cell-bg: #ddd;
  --grid-bg: #ccc;
  --overlay-bg: rgba(240,240,245,0.92);
}
#top-bar {
  width: 100%;
  max-width: 500px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  font-size: 10px;
}
#top-bar a {
  color: var(--accent);
  text-decoration: none;
}
#top-bar a:hover { text-decoration: underline; }
.top-btns { display: flex; gap: 8px; }
.icon-btn {
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 4px;
}
.icon-btn:hover { background: var(--accent); color: var(--bg); }
h1 {
  font-size: 28px;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
  margin: 8px 0;
}
#score-bar {
  display: flex;
  gap: 20px;
  margin: 10px 0 14px;
  font-size: 10px;
}
.score-box {
  text-align: center;
  background: var(--grid-bg);
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--accent);
}
.score-box .label { color: var(--accent); font-size: 8px; margin-bottom: 4px; }
.score-box .val { font-size: 14px; }
#grid-wrap {
  position: relative;
  width: 340px;
  height: 340px;
}
#grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 6px;
  background: var(--grid-bg);
  border-radius: 10px;
  border: 2px solid var(--accent);
  box-shadow: 0 0 20px rgba(170,0,255,0.3);
  width: 100%;
  height: 100%;
}
.cell {
  background: var(--cell-bg);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  transition: none;
  position: relative;
}
.cell[data-val] {
  animation: pop 0.15s ease;
}
@keyframes pop {
  0% { transform: scale(0.5); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes glow2048 {
  0%, 100% { box-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700; }
  50% { box-shadow: 0 0 25px #ffd700, 0 0 50px #ffd700, 0 0 80px #ffd700; }
}
#overlay {
  display: none;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--overlay-bg);
  border-radius: 10px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  gap: 14px;
  text-align: center;
  padding: 20px;
}
#overlay.show { display: flex; }
#overlay h2 { font-size: 18px; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
#overlay .msg { font-size: 10px; margin: 4px 0; }
#overlay button {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 10px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 6px;
}
#overlay button:hover { filter: brightness(1.3); }
#continue-btn {
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
}
#new-game-btn {
  margin-top: 14px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 8px 16px;
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: 6px;
  cursor: pointer;
}
#new-game-btn:hover { background: var(--accent); color: #fff; }
#how {
  margin-top: 14px;
  font-size: 8px;
  color: #666;
  max-width: 340px;
  text-align: center;
  line-height: 1.8;
}
@media (max-width: 400px) {
  #grid-wrap { width: 92vw; height: 92vw; }
  .cell { font-size: 14px; }
  h1 { font-size: 22px; }
}
</style>
</head>
<body>
<div id="top-bar">
  <a href="../index.html">← 허브로 돌아가기</a>
  <div class="top-btns">
    <button class="icon-btn" id="theme-btn" title="테마 전환">🌙</button>
    <button class="icon-btn" id="sound-btn" title="소리 토글">🔊</button>
  </div>
</div>
<h1>2048</h1>
<div id="score-bar">
  <div class="score-box"><div class="label">점수</div><div class="val" id="score">0</div></div>
  <div class="score-box"><div class="label">최고</div><div class="val" id="best">0</div></div>
</div>
<div id="grid-wrap">
  <div id="grid"></div>
  <div id="overlay">
    <h2 id="overlay-title"></h2>
    <div class="msg" id="overlay-msg"></div>
    <button id="continue-btn" style="display:none">계속 하기</button>
    <button id="restart-btn">다시 하기</button>
  </div>
</div>
<button id="new-game-btn">새 게임</button>
<div id="how">방향키 또는 스와이프로 타일을 밀어 같은 숫자를 합치세요. 2048을 만들면 승리!</div>

<script>
const TILE_COLORS = {
  2:    { bg: '#003333', color: '#00ffff', shadow: '#00ffff' },
  4:    { bg: '#003300', color: '#00ff66', shadow: '#00ff66' },
  8:    { bg: '#332200', color: '#ff8800', shadow: '#ff8800' },
  16:   { bg: '#330022', color: '#ff66aa', shadow: '#ff66aa' },
  32:   { bg: '#330000', color: '#ff3333', shadow: '#ff3333' },
  64:   { bg: '#333300', color: '#ffff00', shadow: '#ffff00' },
  128:  { bg: '#220033', color: '#aa00ff', shadow: '#aa00ff' },
  256:  { bg: '#001133', color: '#4488ff', shadow: '#4488ff' },
  512:  { bg: '#113300', color: '#88ff00', shadow: '#88ff00' },
  1024: { bg: '#330033', color: '#ff00ff', shadow: '#ff00ff' },
  2048: { bg: '#332800', color: '#ffd700', shadow: '#ffd700' },
};

let grid, score, best, won, over, keepPlaying;
const gridEl = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg = document.getElementById('overlay-msg');
const continueBtn = document.getElementById('continue-btn');
const restartBtn = document.getElementById('restart-btn');
const soundBtn = document.getElementById('sound-btn');
const themeBtn = document.getElementById('theme-btn');

// --- Audio ---
let audioCtx;
let soundOn = localStorage.getItem('arcade_sound') !== 'off';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playBeep(freq, dur) {
  if (!soundOn) return;
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function mergeSound() { playBeep(660, 0.1); }
function gameOverSound() {
  if (!soundOn) return;
  ensureAudio();
  [200, 160, 120].forEach((f, i) => {
    setTimeout(() => playBeep(f, 0.2), i * 150);
  });
}
function winSound() {
  if (!soundOn) return;
  ensureAudio();
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playBeep(f, 0.15), i * 100);
  });
}

function updateSoundBtn() {
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
}
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  localStorage.setItem('arcade_sound', soundOn ? 'on' : 'off');
  updateSoundBtn();
});
updateSoundBtn();

// --- Theme ---
let darkMode = localStorage.getItem('arcade_theme') !== 'light';
function applyTheme() {
  document.body.classList.toggle('light', !darkMode);
  themeBtn.textContent = darkMode ? '🌙' : '☀️';
}
themeBtn.addEventListener('click', () => {
  darkMode = !darkMode;
  localStorage.setItem('arcade_theme', darkMode ? 'dark' : 'light');
  applyTheme();
});
applyTheme();

// --- Game Logic ---
function init() {
  grid = Array.from({ length: 4 }, () => Array(4).fill(0));
  score = 0;
  won = false;
  over = false;
  keepPlaying = false;
  best = parseInt(localStorage.getItem('2048_best')) || 0;
  addTile();
  addTile();
  render();
  overlay.classList.remove('show');
}

function addTile() {
  const empty = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  gridEl.innerHTML = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const v = grid[r][c];
      if (v) {
        cell.textContent = v;
        cell.setAttribute('data-val', v);
        const t = TILE_COLORS[v] || TILE_COLORS[2048];
        cell.style.background = t.bg;
        cell.style.color = t.color;
        cell.style.textShadow = `0 0 8px ${t.shadow}`;
        if (v === 2048) {
          cell.style.animation = 'glow2048 1.5s infinite, pop 0.15s ease';
        }
        if (v >= 1024) cell.style.fontSize = '12px';
        else if (v >= 128) cell.style.fontSize = '14px';
      }
      gridEl.appendChild(cell);
    }
  }
  scoreEl.textContent = score;
  bestEl.textContent = best;
}

function slide(row) {
  let arr = row.filter(v => v !== 0);
  let merged = false;
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      score += arr[i];
      arr.splice(i + 1, 1);
      merged = true;
    }
  }
  while (arr.length < 4) arr.push(0);
  return { row: arr, merged };
}

function move(dir) {
  if (over && !keepPlaying) return false;
  let moved = false;
  let anyMerge = false;
  const oldGrid = grid.map(r => [...r]);

  for (let i = 0; i < 4; i++) {
    let line;
    if (dir === 'left')       line = [...grid[i]];
    else if (dir === 'right') line = [...grid[i]].reverse();
    else if (dir === 'up')    line = [grid[0][i], grid[1][i], grid[2][i], grid[3][i]];
    else                      line = [grid[3][i], grid[2][i], grid[1][i], grid[0][i]];

    const { row, merged } = slide(line);
    if (merged) anyMerge = true;

    if (dir === 'right') row.reverse();
    if (dir === 'down') row.reverse();

    for (let j = 0; j < 4; j++) {
      if (dir === 'left' || dir === 'right') {
        if (grid[i][j] !== row[j]) moved = true;
        grid[i][j] = row[j];
      } else {
        if (grid[j][i] !== row[j]) moved = true;
        grid[j][i] = row[j];
      }
    }
  }

  if (moved) {
    if (anyMerge) mergeSound();
    addTile();
    if (score > best) {
      best = score;
      localStorage.setItem('2048_best', best);
    }
    render();
    checkState();
  }
  return moved;
}

function hasAvailableMoves() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      if (grid[r][c] === 0) return true;
      if (c < 3 && grid[r][c] === grid[r][c + 1]) return true;
      if (r < 3 && grid[r][c] === grid[r + 1][c]) return true;
    }
  return false;
}

function has2048() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (grid[r][c] === 2048) return true;
  return false;
}

function checkState() {
  if (!won && !keepPlaying && has2048()) {
    won = true;
    winSound();
    showOverlay('승리! 🎉', `점수: ${score}`, true);
    return;
  }
  if (!hasAvailableMoves()) {
    over = true;
    gameOverSound();
    showOverlay('게임 오버', `최종 점수: ${score}`, false);
  }
}

function showOverlay(title, msg, canContinue) {
  overlayTitle.textContent = title;
  overlayMsg.textContent = msg;
  continueBtn.style.display = canContinue ? 'inline-block' : 'none';
  overlay.classList.add('show');
}

continueBtn.addEventListener('click', () => {
  keepPlaying = true;
  overlay.classList.remove('show');
});
restartBtn.addEventListener('click', init);
document.getElementById('new-game-btn').addEventListener('click', init);

// --- Input ---
document.addEventListener('keydown', e => {
  const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Swipe
let tx, ty;
const wrap = document.getElementById('grid-wrap');
wrap.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
wrap.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if (Math.max(ax, ay) < 30) return;
  if (ax > ay) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});

init();
</script>
</body>
</html>
