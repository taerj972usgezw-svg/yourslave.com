<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브레이크아웃 - YourSlave</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #00ffff;
  font-family: 'Press Start 2P', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}
body.light-mode {
  background: #e8eaf6;
  color: #1a237e;
}
body.light-mode #top-bar a {
  color: #1a237e;
  text-shadow: none;
}
body.light-mode #top-bar a:hover {
  color: #000;
  text-shadow: none;
}
body.light-mode #hud {
  color: #1a237e;
  text-shadow: none;
}
body.light-mode canvas {
  border-color: #1a237e33;
  box-shadow: 0 0 20px #1a237e22;
  background: #e8eaf6;
}
body.light-mode #overlay {
  background: rgba(232,234,246,0.9);
}
body.light-mode #overlay h2 {
  text-shadow: none;
}
body.light-mode #overlay .score-display {
  color: #1a237e;
  text-shadow: none;
}
body.light-mode #overlay button {
  color: #1a237e;
  border-color: #1a237e;
  text-shadow: none;
  box-shadow: 0 0 10px #1a237e22;
}
body.light-mode #overlay button:hover {
  background: #1a237e22;
}
body.light-mode #start-msg {
  color: #1a237e;
  text-shadow: none;
}
#top-bar {
  width: 100%;
  max-width: 800px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  font-size: 11px;
}
#top-bar a {
  color: #00ffff;
  text-decoration: none;
  text-shadow: 0 0 8px #00ffff;
  transition: color 0.2s;
}
#top-bar a:hover { color: #fff; text-shadow: 0 0 12px #fff; }
.top-bar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.toggle-btn {
  background: none;
  border: 1px solid #00ffff44;
  border-radius: 4px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  transition: border-color 0.2s;
}
.toggle-btn:hover {
  border-color: #00ffffaa;
}
body.light-mode .toggle-btn {
  border-color: #1a237e44;
}
body.light-mode .toggle-btn:hover {
  border-color: #1a237eaa;
}
#hud {
  width: 100%;
  max-width: 800px;
  display: flex;
  justify-content: space-between;
  padding: 8px 16px;
  font-size: 12px;
  text-shadow: 0 0 6px #00ffff;
}
#game-container {
  position: relative;
  width: 100%;
  max-width: 800px;
}
canvas {
  display: block;
  width: 100%;
  height: auto;
  border: 1px solid #00ffff33;
  box-shadow: 0 0 20px #00ffff22;
  background: #0a0a1a;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(10,10,26,0.85);
  gap: 24px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#overlay.active { opacity: 1; pointer-events: auto; }
#overlay h2 {
  font-size: 28px;
  color: #ff0066;
  text-shadow: 0 0 20px #ff0066, 0 0 40px #ff006688;
}
#overlay .score-display {
  font-size: 16px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff;
}
#overlay .best-display {
  font-size: 11px;
  color: #ffcc00;
  text-shadow: 0 0 8px #ffcc00;
}
body.light-mode #overlay .best-display {
  color: #e65100;
  text-shadow: none;
}
#overlay button {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  padding: 14px 28px;
  background: transparent;
  color: #00ffff;
  border: 2px solid #00ffff;
  cursor: pointer;
  text-shadow: 0 0 8px #00ffff;
  box-shadow: 0 0 15px #00ffff44;
  transition: all 0.2s;
}
#overlay button:hover {
  background: #00ffff22;
  box-shadow: 0 0 25px #00ffff88;
}
#start-msg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 13px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff;
  pointer-events: none;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>
<div id="top-bar">
  <a href="../index.html">&larr; 허브로 돌아가기</a>
  <div class="top-bar-right">
    <span>브레이크아웃</span>
    <button class="toggle-btn" id="sound-toggle" title="Sound">🔊</button>
    <button class="toggle-btn" id="theme-toggle" title="Theme">🌙</button>
  </div>
</div>
<div id="hud">
  <span id="hud-score">점수: 0</span>
  <span id="hud-best">최고: 0</span>
  <span id="hud-lives">생명: &#9829; &#9829; &#9829;</span>
</div>
<div id="game-container">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="start-msg">클릭하여 시작</div>
  <div id="overlay">
    <h2 id="overlay-title">게임 오버</h2>
    <div class="score-display" id="overlay-score">점수: 0</div>
    <div class="best-display" id="overlay-best"></div>
    <button id="overlay-btn">다시 하기</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

const hudScore = document.getElementById('hud-score');
const hudLives = document.getElementById('hud-lives');
const hudBest = document.getElementById('hud-best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayScore = document.getElementById('overlay-score');
const overlayBest = document.getElementById('overlay-best');
const overlayBtn = document.getElementById('overlay-btn');
const startMsg = document.getElementById('start-msg');
const soundToggle = document.getElementById('sound-toggle');
const themeToggle = document.getElementById('theme-toggle');

// ===== Sound System (Web Audio API) =====
let audioCtx = null;
let soundEnabled = localStorage.getItem('arcade_sound') !== 'off';

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freq, duration, type, volume) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume || 0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}

function playBrickSound() {
  playTone(660, 0.08, 'square', 0.07);
}

function playPaddleSound() {
  playTone(330, 0.1, 'triangle', 0.06);
}

function playGameOverSound() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    [200, 160, 120].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(f, now + i * 0.15);
      gain.gain.setValueAtTime(0.08, now + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.3);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.15);
      osc.stop(now + i * 0.15 + 0.3);
    });
  } catch (e) {}
}

function playVictorySound() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    [523, 659, 784, 1047].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(f, now + i * 0.12);
      gain.gain.setValueAtTime(0.08, now + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.25);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.12);
      osc.stop(now + i * 0.12 + 0.25);
    });
  } catch (e) {}
}

// Sound toggle
function updateSoundButton() {
  soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
}
updateSoundButton();

soundToggle.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  localStorage.setItem('arcade_sound', soundEnabled ? 'on' : 'off');
  updateSoundButton();
});

// ===== Theme System =====
let lightMode = localStorage.getItem('arcade_theme') === 'light';

function applyTheme() {
  if (lightMode) {
    document.body.classList.add('light-mode');
    themeToggle.textContent = '☀️';
  } else {
    document.body.classList.remove('light-mode');
    themeToggle.textContent = '🌙';
  }
}
applyTheme();

themeToggle.addEventListener('click', () => {
  lightMode = !lightMode;
  localStorage.setItem('arcade_theme', lightMode ? 'light' : 'dark');
  applyTheme();
});

// ===== Best Score =====
let bestScore = parseInt(localStorage.getItem('breakout_best')) || 0;

function updateBestScore() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('breakout_best', bestScore);
  }
}

function displayBest() {
  hudBest.textContent = `최고: ${bestScore}`;
}

// Neon brick colors
const BRICK_COLORS = [
  '#ff0066', '#ff3399', '#ff00ff',
  '#9933ff', '#6600ff', '#3366ff',
  '#00ccff', '#00ffff', '#00ff99',
  '#66ff33'
];

// Game state
let score, lives, bricks, ball, paddle, gameRunning, launched, particles;

function initGame() {
  score = 0;
  lives = 3;
  particles = [];
  gameRunning = true;
  launched = false;
  overlay.classList.remove('active');
  startMsg.style.display = 'flex';
  initBricks();
  initPaddle();
  initBall();
  updateHUD();
  displayBest();
}

function initPaddle() {
  paddle = { x: W / 2, y: H - 30, w: 120, h: 14, speed: 0 };
}

function initBall() {
  ball = {
    x: W / 2,
    y: paddle.y - 10,
    r: 8,
    dx: 0,
    dy: 0,
    speed: 5,
    trail: []
  };
}

function launchBall() {
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
  ball.dx = ball.speed * Math.cos(angle);
  ball.dy = ball.speed * Math.sin(angle);
  launched = true;
  startMsg.style.display = 'none';
}

function initBricks() {
  bricks = [];
  const rows = 8;
  const cols = 10;
  const brickW = 68;
  const brickH = 20;
  const padX = (W - cols * (brickW + 6) + 6) / 2;
  const padY = 50;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      bricks.push({
        x: padX + c * (brickW + 6),
        y: padY + r * (brickH + 6),
        w: brickW,
        h: brickH,
        color: BRICK_COLORS[r % BRICK_COLORS.length],
        alive: true,
        points: (rows - r) * 10
      });
    }
  }
}

function updateHUD() {
  hudScore.textContent = `점수: ${score}`;
  let hearts = '';
  for (let i = 0; i < 3; i++) hearts += i < lives ? ' \u2665' : ' \u2661';
  hudLives.textContent = `생명:${hearts}`;
  displayBest();
}

// Mouse / Touch
let mouseX = W / 2;

function getCanvasX(clientX) {
  const rect = canvas.getBoundingClientRect();
  return (clientX - rect.left) * (W / rect.width);
}

canvas.addEventListener('mousemove', e => {
  mouseX = getCanvasX(e.clientX);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = getCanvasX(e.touches[0].clientX);
}, { passive: false });

canvas.addEventListener('click', () => {
  if (!launched && gameRunning) launchBall();
});
canvas.addEventListener('touchstart', e => {
  if (!launched && gameRunning) launchBall();
});

overlayBtn.addEventListener('click', initGame);

// Particles
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// Collision helpers
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function ballRectCollision(bx, by, br, rx, ry, rw, rh) {
  const cx = clamp(bx, rx, rx + rw);
  const cy = clamp(by, ry, ry + rh);
  const dx = bx - cx;
  const dy = by - cy;
  return dx * dx + dy * dy <= br * br;
}

// Update
function update() {
  // Move paddle toward mouse
  const targetX = clamp(mouseX, paddle.w / 2, W - paddle.w / 2);
  paddle.x += (targetX - paddle.x) * 0.3;

  if (!launched) {
    ball.x = paddle.x;
    ball.y = paddle.y - ball.r - paddle.h / 2;
    return;
  }

  // Ball trail
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 8) ball.trail.shift();

  // Move ball
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall collisions
  if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
  if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); }
  if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

  // Bottom - lose life
  if (ball.y - ball.r > H) {
    lives--;
    updateHUD();
    if (lives <= 0) {
      gameOver(false);
      return;
    }
    launched = false;
    initBall();
    startMsg.style.display = 'flex';
    return;
  }

  // Paddle collision
  const px = paddle.x - paddle.w / 2;
  const py = paddle.y - paddle.h / 2;
  if (ballRectCollision(ball.x, ball.y, ball.r, px, py, paddle.w, paddle.h) && ball.dy > 0) {
    // Where on the paddle did it hit? -1 to 1
    const hit = (ball.x - paddle.x) / (paddle.w / 2);
    const angle = hit * (Math.PI / 3); // max 60 degree deflection
    const speed = Math.min(ball.speed + 0.05, 9);
    ball.speed = speed;
    ball.dx = speed * Math.sin(angle);
    ball.dy = -speed * Math.cos(angle);
    ball.y = py - ball.r;
    spawnParticles(ball.x, ball.y, '#00ffff', 5);
    playPaddleSound();
  }

  // Brick collision
  let allDead = true;
  for (const b of bricks) {
    if (!b.alive) continue;
    allDead = false;
    if (ballRectCollision(ball.x, ball.y, ball.r, b.x, b.y, b.w, b.h)) {
      b.alive = false;
      score += b.points;
      updateHUD();
      spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 12);
      playBrickSound();

      // Determine which side was hit
      const overlapLeft = (ball.x + ball.r) - b.x;
      const overlapRight = (b.x + b.w) - (ball.x - ball.r);
      const overlapTop = (ball.y + ball.r) - b.y;
      const overlapBottom = (b.y + b.h) - (ball.y - ball.r);

      const minOverlapX = Math.min(overlapLeft, overlapRight);
      const minOverlapY = Math.min(overlapTop, overlapBottom);

      if (minOverlapX < minOverlapY) {
        ball.dx = -ball.dx;
      } else {
        ball.dy = -ball.dy;
      }
      break; // one brick per frame
    }
  }

  if (allDead) {
    gameOver(true);
  }
}

function gameOver(won) {
  gameRunning = false;
  launched = false;
  startMsg.style.display = 'none';
  overlayTitle.textContent = won ? '승리!' : '게임 오버';
  overlayTitle.style.color = won ? '#00ff99' : '#ff0066';
  overlayTitle.style.textShadow = won
    ? '0 0 20px #00ff99, 0 0 40px #00ff9988'
    : '0 0 20px #ff0066, 0 0 40px #ff006688';
  overlayScore.textContent = `최종 점수: ${score}`;

  // Update best score
  updateBestScore();
  if (score >= bestScore) {
    overlayBest.textContent = `새로운 최고 기록!`;
  } else {
    overlayBest.textContent = `최고 기록: ${bestScore}`;
  }

  overlay.classList.add('active');

  // Play end sound
  if (won) {
    playVictorySound();
  } else {
    playGameOverSound();
  }
}

// Draw
function draw() {
  const isLight = lightMode;
  const bgColor = isLight ? '#e8eaf6' : '#0a0a1a';

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  // Draw subtle grid
  ctx.strokeStyle = isLight ? '#00000008' : '#ffffff08';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Draw bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = isLight ? 4 : 12;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    roundRect(ctx, b.x, b.y, b.w, b.h, 3);
    ctx.fill();

    // Inner highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, b.h / 2 - 2);
  }
  ctx.shadowBlur = 0;

  // Draw paddle
  const paddleColor = isLight ? '#1a237e' : '#00ffff';
  ctx.shadowColor = paddleColor;
  ctx.shadowBlur = isLight ? 4 : 16;
  ctx.fillStyle = paddleColor;
  const px = paddle.x - paddle.w / 2;
  const py = paddle.y - paddle.h / 2;
  ctx.beginPath();
  roundRect(ctx, px, py, paddle.w, paddle.h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Paddle highlight
  const grad = ctx.createLinearGradient(px, py, px, py + paddle.h);
  grad.addColorStop(0, 'rgba(255,255,255,0.3)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  roundRect(ctx, px, py, paddle.w, paddle.h, 6);
  ctx.fill();

  // Draw ball trail
  const trailColor = isLight ? '#1a237e' : '#00ffff';
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.4;
    const size = ball.r * (i / ball.trail.length);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = trailColor;
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw ball
  const ballColor = isLight ? '#1a237e' : '#ffffff';
  const ballGlow = isLight ? '#3949ab' : '#00ffff';
  ctx.shadowColor = ballColor;
  ctx.shadowBlur = isLight ? 6 : 20;
  ctx.fillStyle = ballColor;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = ballGlow;
  ctx.shadowBlur = isLight ? 8 : 30;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Draw particles
  drawParticles();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Game loop
function loop() {
  if (gameRunning) {
    update();
    updateParticles();
  }
  draw();
  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
</body>
</html>
