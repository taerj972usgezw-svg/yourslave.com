<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우주 슈팅 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--accent);
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  transition: background 0.3s, color 0.3s;
}
body.dark {
  --bg: #0a0a1a;
  --accent: #00ff41;
  --accent-dim: #00ff4188;
  --accent-vdim: #00ff4133;
  --accent-glow: #00ff4122;
  --accent-bg: #0a0a1aee;
  --canvas-bg: #0a0a1a;
  --text-secondary: #00ff41aa;
  --btn-text: #0a0a1a;
  --overlay-bg: #0a0a1aee;
  --hud-color: #00ff41;
}
body.light {
  --bg: #e8eaf6;
  --accent: #1b5e20;
  --accent-dim: #1b5e2088;
  --accent-vdim: #1b5e2033;
  --accent-glow: #1b5e2022;
  --accent-bg: #e8eaf6ee;
  --canvas-bg: #c5cae9;
  --text-secondary: #1b5e20aa;
  --btn-text: #e8eaf6;
  --overlay-bg: #e8eaf6ee;
  --hud-color: #1b5e20;
}
#top-bar {
  width: 100%;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}
#top-bar a {
  color: var(--accent);
  text-decoration: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  transition: text-shadow 0.2s;
}
#top-bar a:hover {
  text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
}
.top-right-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}
.toggle-btn {
  background: none;
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: all 0.2s;
  line-height: 1;
}
.toggle-btn:hover {
  border-color: var(--accent);
  text-shadow: 0 0 8px var(--accent);
}
#hud {
  display: flex;
  gap: 30px;
  font-size: 11px;
  color: var(--hud-color);
}
#hud span { white-space: nowrap; }
canvas {
  display: block;
  border: 1px solid var(--accent-vdim);
  box-shadow: 0 0 20px var(--accent-glow), inset 0 0 20px var(--accent-glow);
}
#game-over-screen {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  background: var(--overlay-bg);
  padding: 40px 50px;
  border: 2px solid var(--accent);
  box-shadow: 0 0 30px var(--accent-dim), inset 0 0 30px var(--accent-glow);
  border-radius: 4px;
}
#game-over-screen h1 {
  font-family: 'Press Start 2P', monospace;
  color: #ff0044;
  font-size: 28px;
  text-shadow: 0 0 20px #ff0044, 0 0 40px #ff0044;
  margin-bottom: 25px;
}
#game-over-screen .final-score {
  font-size: 16px;
  margin-bottom: 10px;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
}
#game-over-screen .best-score {
  font-size: 11px;
  margin-bottom: 30px;
  color: var(--text-secondary);
}
#play-again-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--btn-text);
  background: var(--accent);
  border: none;
  padding: 15px 30px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 15px var(--accent-dim);
}
#play-again-btn:hover {
  box-shadow: 0 0 30px var(--accent);
  transform: scale(1.05);
}
#start-screen {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  background: var(--overlay-bg);
  padding: 40px 50px;
  border: 2px solid var(--accent);
  box-shadow: 0 0 30px var(--accent-dim);
  border-radius: 4px;
}
#start-screen h1 {
  font-family: 'Press Start 2P', monospace;
  color: var(--accent);
  font-size: 22px;
  text-shadow: 0 0 20px var(--accent);
  margin-bottom: 20px;
}
#start-screen p {
  font-size: 10px;
  line-height: 2;
  margin-bottom: 25px;
  color: var(--text-secondary);
}
#start-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--btn-text);
  background: var(--accent);
  border: none;
  padding: 15px 30px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 15px var(--accent-dim);
}
#start-btn:hover {
  box-shadow: 0 0 30px var(--accent);
  transform: scale(1.05);
}
#mobile-controls {
  display: none;
  position: fixed;
  bottom: 10px;
  left: 0; right: 0;
  z-index: 30;
  justify-content: space-between;
  padding: 0 15px;
}
.mobile-btn-group {
  display: flex;
  gap: 8px;
}
.mobile-btn {
  width: 56px; height: 56px;
  background: var(--accent-glow);
  border: 2px solid var(--accent-dim);
  border-radius: 8px;
  color: var(--accent);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
.mobile-btn:active { background: var(--accent-dim); }
.mobile-btn.fire-btn {
  width: 80px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
}
@media (max-width: 768px) {
  #mobile-controls { display: flex; }
  #hud { gap: 15px; font-size: 9px; }
  #top-bar a { font-size: 9px; }
  .toggle-btn { font-size: 11px; padding: 3px 6px; }
}
</style>
</head>
<body class="dark">
<div id="top-bar">
  <a href="../index.html">&larr; 허브로 돌아가기</a>
  <div class="top-right-controls">
    <div id="hud">
      <span>점수: <b id="score-display">0</b></span>
      <span>최고: <b id="best-display">0</b></span>
      <span>생명: <b id="lives-display">&#9829;&#9829;&#9829;</b></span>
    </div>
    <button class="toggle-btn" id="sound-toggle" title="사운드 토글">&#128266;</button>
    <button class="toggle-btn" id="theme-toggle" title="테마 토글">&#9788;</button>
  </div>
</div>
<canvas id="gameCanvas"></canvas>

<div id="start-screen">
  <h1>우주 슈팅</h1>
  <p>
    &larr; &rarr; : 이동<br>
    스페이스바 : 발사<br>
    적을 파괴하고 점수를 올리세요!
  </p>
  <button id="start-btn">시작하기</button>
</div>

<div id="game-over-screen">
  <h1>게임 오버</h1>
  <div class="final-score">최종 점수: <span id="final-score">0</span></div>
  <div class="best-score">최고 기록: <span id="best-score-display">0</span></div>
  <button id="play-again-btn">다시 하기</button>
</div>

<div id="mobile-controls">
  <div class="mobile-btn-group">
    <div class="mobile-btn" id="btn-left">&#9664;</div>
    <div class="mobile-btn" id="btn-right">&#9654;</div>
  </div>
  <div class="mobile-btn-group">
    <div class="mobile-btn" id="btn-up">&#9650;</div>
    <div class="mobile-btn" id="btn-down">&#9660;</div>
  </div>
  <div class="mobile-btn fire-btn" id="btn-fire">발사</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ─── Theme ──────────────────────────────────────────
let currentTheme = localStorage.getItem('arcade_theme') === 'light' ? 'light' : 'dark';
function applyTheme(theme) {
  currentTheme = theme;
  document.body.className = theme;
  localStorage.setItem('arcade_theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '\u2606' : '\u2605';
}
applyTheme(currentTheme);
document.getElementById('theme-toggle').addEventListener('click', () => {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

// ─── Sound (Web Audio API) ──────────────────────────
let audioCtx = null;
let soundEnabled = localStorage.getItem('arcade_sound') !== 'off';

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function updateSoundBtn() {
  document.getElementById('sound-toggle').textContent = soundEnabled ? '\u{1F50A}' : '\u{1F507}';
}
updateSoundBtn();

document.getElementById('sound-toggle').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  localStorage.setItem('arcade_sound', soundEnabled ? 'on' : 'off');
  updateSoundBtn();
});

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = ensureAudioCtx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'shoot') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(440, now + 0.08);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.start(now);
      osc.stop(now + 0.08);
    } else if (type === 'destroy') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.25);
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.start(now);
      osc.stop(now + 0.25);
      // Add noise burst
      const noise = ctx.createOscillator();
      const ng = ctx.createGain();
      noise.type = 'square';
      noise.frequency.setValueAtTime(120, now);
      noise.frequency.setValueAtTime(80, now + 0.05);
      noise.connect(ng);
      ng.connect(ctx.destination);
      ng.gain.setValueAtTime(0.1, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      noise.start(now);
      noise.stop(now + 0.15);
    } else if (type === 'hit') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'gameover') {
      osc.type = 'square';
      gain.gain.setValueAtTime(0.15, now);
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(330, now + 0.2);
      osc.frequency.setValueAtTime(220, now + 0.4);
      osc.frequency.setValueAtTime(110, now + 0.6);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
      osc.start(now);
      osc.stop(now + 0.9);
    }
  } catch (e) {}
}

// ─── Best Score ─────────────────────────────────────
let bestScore = parseInt(localStorage.getItem('shooting_best')) || 0;
document.getElementById('best-display').textContent = bestScore;

function saveBestScore() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('shooting_best', bestScore);
  }
  document.getElementById('best-display').textContent = bestScore;
}

// ─── Canvas Resize ──────────────────────────────────
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 20, 600);
  const maxH = Math.min(window.innerHeight - 60, 800);
  canvas.width = maxW;
  canvas.height = maxH;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Game State ─────────────────────────────────────
let gameRunning = false;
let score = 0;
let lives = 3;
let animFrame;
let difficulty = 1;
let enemySpawnTimer = 0;
let shootCooldown = 0;

// Keys
const keys = {};

// Player
const player = { x: 0, y: 0, w: 36, h: 40, speed: 5, color: '#00ff41' };
let bullets = [];
let enemies = [];
let particles = [];
let stars = [];

// Initialize stars
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 1.5 + 0.3,
      brightness: Math.random()
    });
  }
}

// Enemy types
const enemyTypes = [
  { name: 'scout', w: 28, h: 28, speed: 2, hp: 1, color: '#ff4444', points: 10, glow: '#ff4444' },
  { name: 'fighter', w: 34, h: 34, speed: 1.5, hp: 2, color: '#ff8800', points: 25, glow: '#ff8800' },
  { name: 'cruiser', w: 44, h: 44, speed: 1, hp: 4, color: '#ff00ff', points: 50, glow: '#ff00ff' },
  { name: 'speeder', w: 22, h: 22, speed: 4, hp: 1, color: '#ffff00', points: 15, glow: '#ffff00' },
  { name: 'tank', w: 50, h: 50, speed: 0.7, hp: 7, color: '#00ccff', points: 100, glow: '#00ccff' }
];

function resetGame() {
  score = 0;
  lives = 3;
  difficulty = 1;
  enemySpawnTimer = 0;
  shootCooldown = 0;
  bullets = [];
  enemies = [];
  particles = [];
  player.x = canvas.width / 2 - player.w / 2;
  player.y = canvas.height - player.h - 20;
  initStars();
  updateHUD();
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  let heartsStr = '';
  for (let i = 0; i < lives; i++) heartsStr += '\u2665';
  for (let i = lives; i < 3; i++) heartsStr += '\u2661';
  document.getElementById('lives-display').textContent = heartsStr;
}

// Get theme-aware colors
function getBgColor() {
  return currentTheme === 'dark' ? '#0a0a1a' : '#c5cae9';
}
function getPlayerColor() {
  return currentTheme === 'dark' ? '#00ff41' : '#1b5e20';
}
function getPlayerGlow() {
  return currentTheme === 'dark' ? '#00ff41' : '#2e7d32';
}
function getCockpitColor() {
  return currentTheme === 'dark' ? '#88ffaa' : '#4caf50';
}
function getEngineColor() {
  return currentTheme === 'dark' ? '#00aaff' : '#1565c0';
}
function getBulletColor() {
  return currentTheme === 'dark' ? '#00ff41' : '#1b5e20';
}
function getBulletInner() {
  return currentTheme === 'dark' ? '#aaffaa' : '#66bb6a';
}
function getEnemyInner() {
  return currentTheme === 'dark' ? '#0a0a1a' : '#c5cae9';
}

// Draw player ship
function drawPlayer() {
  ctx.save();
  ctx.shadowColor = getPlayerGlow();
  ctx.shadowBlur = 15;

  const pc = getPlayerColor();
  ctx.fillStyle = pc;
  ctx.beginPath();
  ctx.moveTo(player.x + player.w / 2, player.y);
  ctx.lineTo(player.x + player.w, player.y + player.h);
  ctx.lineTo(player.x + player.w * 0.75, player.y + player.h * 0.75);
  ctx.lineTo(player.x + player.w * 0.25, player.y + player.h * 0.75);
  ctx.lineTo(player.x, player.y + player.h);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = getCockpitColor();
  ctx.beginPath();
  ctx.moveTo(player.x + player.w / 2, player.y + 10);
  ctx.lineTo(player.x + player.w * 0.6, player.y + player.h * 0.55);
  ctx.lineTo(player.x + player.w * 0.4, player.y + player.h * 0.55);
  ctx.closePath();
  ctx.fill();

  const ec = getEngineColor();
  ctx.shadowColor = ec;
  ctx.shadowBlur = 20;
  ctx.fillStyle = ec;
  const flicker = Math.random() * 6;
  ctx.fillRect(player.x + player.w * 0.35, player.y + player.h * 0.75, player.w * 0.3, 6 + flicker);

  ctx.restore();
}

// Draw enemy ship
function drawEnemy(e) {
  ctx.save();
  ctx.shadowColor = e.glow;
  ctx.shadowBlur = 12;
  ctx.fillStyle = e.color;

  if (e.name === 'scout') {
    ctx.beginPath();
    ctx.moveTo(e.x + e.w / 2, e.y + e.h);
    ctx.lineTo(e.x + e.w, e.y);
    ctx.lineTo(e.x, e.y);
    ctx.closePath();
    ctx.fill();
  } else if (e.name === 'fighter') {
    ctx.beginPath();
    ctx.moveTo(e.x + e.w / 2, e.y + e.h);
    ctx.lineTo(e.x + e.w, e.y + 5);
    ctx.lineTo(e.x + e.w * 0.7, e.y);
    ctx.lineTo(e.x + e.w * 0.3, e.y);
    ctx.lineTo(e.x, e.y + 5);
    ctx.closePath();
    ctx.fill();
  } else if (e.name === 'cruiser') {
    ctx.fillRect(e.x + 5, e.y, e.w - 10, e.h);
    ctx.fillRect(e.x, e.y + 10, e.w, e.h - 20);
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#ffffff55';
    ctx.fillRect(e.x + e.w / 2 - 4, e.y + e.h - 8, 8, 8);
  } else if (e.name === 'speeder') {
    ctx.beginPath();
    ctx.moveTo(e.x + e.w / 2, e.y + e.h);
    ctx.lineTo(e.x + e.w, e.y + e.h / 2);
    ctx.lineTo(e.x + e.w / 2, e.y);
    ctx.lineTo(e.x, e.y + e.h / 2);
    ctx.closePath();
    ctx.fill();
  } else if (e.name === 'tank') {
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = getEnemyInner();
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bar for enemies with hp > 1
  if (e.maxHp > 1) {
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#333';
    ctx.fillRect(e.x, e.y - 6, e.w, 3);
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / e.maxHp), 3);
  }

  ctx.restore();
}

// Spawn enemy
function spawnEnemy() {
  let typeIndex;
  const r = Math.random();
  if (difficulty < 3) {
    typeIndex = r < 0.5 ? 0 : (r < 0.8 ? 3 : 1);
  } else if (difficulty < 6) {
    typeIndex = r < 0.3 ? 0 : (r < 0.5 ? 3 : (r < 0.75 ? 1 : 2));
  } else {
    typeIndex = r < 0.2 ? 0 : (r < 0.35 ? 3 : (r < 0.55 ? 1 : (r < 0.8 ? 2 : 4)));
  }
  const type = enemyTypes[typeIndex];
  const speedMult = 1 + (difficulty - 1) * 0.08;
  enemies.push({
    x: Math.random() * (canvas.width - type.w),
    y: -type.h,
    w: type.w,
    h: type.h,
    speed: type.speed * speedMult,
    hp: type.hp,
    maxHp: type.hp,
    color: type.color,
    glow: type.glow,
    points: type.points,
    name: type.name,
    wobble: type.name === 'speeder' ? Math.random() * Math.PI * 2 : 0
  });
}

// Spawn particles (explosion)
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      size: Math.random() * 4 + 2,
      color
    });
  }
}

// Shoot
function shoot() {
  if (shootCooldown > 0) return;
  shootCooldown = 10;
  bullets.push({
    x: player.x + player.w / 2 - 2,
    y: player.y - 5,
    w: 4,
    h: 12,
    speed: 8,
    color: getBulletColor()
  });
  playSound('shoot');
}

// Collision detection
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// Update
function update() {
  // Player movement
  if (keys['ArrowLeft'] || keys['mLeft']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['mRight']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['mUp']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['mDown']) player.y += player.speed;

  // Clamp player
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

  // Shooting
  if (keys[' '] || keys['mFire']) shoot();
  if (shootCooldown > 0) shootCooldown--;

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= bullets[i].speed;
    if (bullets[i].y + bullets[i].h < 0) bullets.splice(i, 1);
  }

  // Update stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    s.brightness += (Math.random() - 0.5) * 0.1;
    s.brightness = Math.max(0.2, Math.min(1, s.brightness));
  }

  // Spawn enemies
  enemySpawnTimer++;
  const spawnRate = Math.max(20, 70 - difficulty * 5);
  if (enemySpawnTimer >= spawnRate) {
    enemySpawnTimer = 0;
    spawnEnemy();
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    if (e.name === 'speeder') {
      e.wobble += 0.1;
      e.x += Math.sin(e.wobble) * 2;
    }

    // Off screen
    if (e.y > canvas.height + 10) {
      enemies.splice(i, 1);
      continue;
    }

    // Bullet-enemy collision
    let hit = false;
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (rectsOverlap(bullets[j], e)) {
        bullets.splice(j, 1);
        e.hp--;
        spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 5);
        if (e.hp <= 0) {
          spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 20);
          score += e.points;
          enemies.splice(i, 1);
          hit = true;
          playSound('destroy');
          updateHUD();
        }
        break;
      }
    }
    if (hit) continue;

    // Player-enemy collision
    if (rectsOverlap({ x: player.x + 4, y: player.y + 4, w: player.w - 8, h: player.h - 8 }, e)) {
      spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 15);
      spawnExplosion(player.x + player.w / 2, player.y + player.h / 2, getPlayerColor(), 15);
      enemies.splice(i, 1);
      lives--;
      playSound('hit');
      updateHUD();
      if (lives <= 0) {
        gameOver();
        return;
      }
      player.x = canvas.width / 2 - player.w / 2;
      player.y = canvas.height - player.h - 20;
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vx *= 0.98;
    p.vy *= 0.98;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Increase difficulty over time
  difficulty = 1 + Math.floor(score / 100);
}

// Draw
function draw() {
  const bg = getBgColor();

  // Clear
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  const starMult = currentTheme === 'dark' ? 0.8 : 0.35;
  for (const s of stars) {
    const alpha = s.brightness * starMult;
    if (currentTheme === 'dark') {
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    } else {
      ctx.fillStyle = `rgba(50, 50, 100, ${alpha})`;
    }
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }

  // Bullets
  ctx.save();
  ctx.shadowColor = getBulletColor();
  ctx.shadowBlur = 12;
  const bc = getBulletColor();
  const bi = getBulletInner();
  for (const b of bullets) {
    ctx.fillStyle = bc;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = bi;
    ctx.fillRect(b.x + 1, b.y, 2, b.h);
  }
  ctx.restore();

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Player
  drawPlayer();

  // Particles
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// Game loop
function gameLoop() {
  if (!gameRunning) return;
  update();
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  resetGame();
  gameRunning = true;
  gameLoop();
}

function gameOver() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  saveBestScore();
  playSound('gameover');
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score-display').textContent = bestScore;
  document.getElementById('game-over-screen').style.display = 'block';
}

// Input handling
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Mobile controls
function setupMobileBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
  el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
  el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[key] = false; });
}
setupMobileBtn('btn-left', 'mLeft');
setupMobileBtn('btn-right', 'mRight');
setupMobileBtn('btn-up', 'mUp');
setupMobileBtn('btn-down', 'mDown');
setupMobileBtn('btn-fire', 'mFire');

// Buttons
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again-btn').addEventListener('click', startGame);

// Init stars for background even before game starts
initStars();
function bgDraw() {
  if (gameRunning) return;
  const bg = getBgColor();
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const starMult = currentTheme === 'dark' ? 0.5 : 0.25;
  for (const s of stars) {
    s.y += s.speed * 0.5;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    const alpha = s.brightness * starMult;
    if (currentTheme === 'dark') {
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    } else {
      ctx.fillStyle = `rgba(50,50,100,${alpha})`;
    }
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  requestAnimationFrame(bgDraw);
}
bgDraw();
</script>
