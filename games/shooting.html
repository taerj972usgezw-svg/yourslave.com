<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우주 슈팅 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #00ff41;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
}
#top-bar {
  width: 100%;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}
#top-bar a {
  color: #00ff41;
  text-decoration: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  transition: text-shadow 0.2s;
}
#top-bar a:hover {
  text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
}
#hud {
  display: flex;
  gap: 30px;
  font-size: 11px;
}
#hud span { white-space: nowrap; }
canvas {
  display: block;
  border: 1px solid #00ff4133;
  box-shadow: 0 0 20px #00ff4122, inset 0 0 20px #00ff4108;
}
#game-over-screen {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  background: #0a0a1aee;
  padding: 40px 50px;
  border: 2px solid #00ff41;
  box-shadow: 0 0 30px #00ff4155, inset 0 0 30px #00ff4122;
  border-radius: 4px;
}
#game-over-screen h1 {
  font-family: 'Press Start 2P', monospace;
  color: #ff0044;
  font-size: 28px;
  text-shadow: 0 0 20px #ff0044, 0 0 40px #ff0044;
  margin-bottom: 25px;
}
#game-over-screen .final-score {
  font-size: 16px;
  margin-bottom: 30px;
  color: #00ff41;
  text-shadow: 0 0 10px #00ff41;
}
#play-again-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: #0a0a1a;
  background: #00ff41;
  border: none;
  padding: 15px 30px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 15px #00ff4188;
}
#play-again-btn:hover {
  background: #33ff66;
  box-shadow: 0 0 30px #00ff41cc;
  transform: scale(1.05);
}
#start-screen {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  background: #0a0a1aee;
  padding: 40px 50px;
  border: 2px solid #00ff41;
  box-shadow: 0 0 30px #00ff4155;
  border-radius: 4px;
}
#start-screen h1 {
  font-family: 'Press Start 2P', monospace;
  color: #00ff41;
  font-size: 22px;
  text-shadow: 0 0 20px #00ff41;
  margin-bottom: 20px;
}
#start-screen p {
  font-size: 10px;
  line-height: 2;
  margin-bottom: 25px;
  color: #00ff41aa;
}
#start-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: #0a0a1a;
  background: #00ff41;
  border: none;
  padding: 15px 30px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 15px #00ff4188;
}
#start-btn:hover {
  background: #33ff66;
  box-shadow: 0 0 30px #00ff41cc;
  transform: scale(1.05);
}
#mobile-controls {
  display: none;
  position: fixed;
  bottom: 10px;
  left: 0; right: 0;
  z-index: 30;
  justify-content: space-between;
  padding: 0 15px;
}
.mobile-btn-group {
  display: flex;
  gap: 8px;
}
.mobile-btn {
  width: 56px; height: 56px;
  background: #00ff4122;
  border: 2px solid #00ff4166;
  border-radius: 8px;
  color: #00ff41;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
.mobile-btn:active { background: #00ff4155; }
.mobile-btn.fire-btn {
  width: 80px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
}
@media (max-width: 768px) {
  #mobile-controls { display: flex; }
  #hud { gap: 15px; font-size: 9px; }
  #top-bar a { font-size: 9px; }
}
</style>
</head>
<body>
<div id="top-bar">
  <a href="../index.html">← 허브로 돌아가기</a>
  <div id="hud">
    <span>점수: <b id="score-display">0</b></span>
    <span>생명: <b id="lives-display">♥♥♥</b></span>
  </div>
</div>
<canvas id="gameCanvas"></canvas>

<div id="start-screen">
  <h1>우주 슈팅</h1>
  <p>
    ← → : 이동<br>
    스페이스바 : 발사<br>
    적을 파괴하고 점수를 올리세요!
  </p>
  <button id="start-btn">시작하기</button>
</div>

<div id="game-over-screen">
  <h1>게임 오버</h1>
  <div class="final-score">최종 점수: <span id="final-score">0</span></div>
  <button id="play-again-btn">다시 하기</button>
</div>

<div id="mobile-controls">
  <div class="mobile-btn-group">
    <div class="mobile-btn" id="btn-left">◀</div>
    <div class="mobile-btn" id="btn-right">▶</div>
  </div>
  <div class="mobile-btn-group">
    <div class="mobile-btn" id="btn-up">▲</div>
    <div class="mobile-btn" id="btn-down">▼</div>
  </div>
  <div class="mobile-btn fire-btn" id="btn-fire">발사</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 20, 600);
  const maxH = Math.min(window.innerHeight - 60, 800);
  canvas.width = maxW;
  canvas.height = maxH;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Game state
let gameRunning = false;
let score = 0;
let lives = 3;
let animFrame;
let difficulty = 1;
let enemySpawnTimer = 0;
let shootCooldown = 0;

// Keys
const keys = {};

// Player
const player = { x: 0, y: 0, w: 36, h: 40, speed: 5, color: '#00ff41' };
let bullets = [];
let enemies = [];
let particles = [];
let stars = [];

// Initialize stars
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 1.5 + 0.3,
      brightness: Math.random()
    });
  }
}

// Enemy types
const enemyTypes = [
  { name: 'scout', w: 28, h: 28, speed: 2, hp: 1, color: '#ff4444', points: 10, glow: '#ff4444' },
  { name: 'fighter', w: 34, h: 34, speed: 1.5, hp: 2, color: '#ff8800', points: 25, glow: '#ff8800' },
  { name: 'cruiser', w: 44, h: 44, speed: 1, hp: 4, color: '#ff00ff', points: 50, glow: '#ff00ff' },
  { name: 'speeder', w: 22, h: 22, speed: 4, hp: 1, color: '#ffff00', points: 15, glow: '#ffff00' },
  { name: 'tank', w: 50, h: 50, speed: 0.7, hp: 7, color: '#00ccff', points: 100, glow: '#00ccff' }
];

function resetGame() {
  score = 0;
  lives = 3;
  difficulty = 1;
  enemySpawnTimer = 0;
  shootCooldown = 0;
  bullets = [];
  enemies = [];
  particles = [];
  player.x = canvas.width / 2 - player.w / 2;
  player.y = canvas.height - player.h - 20;
  initStars();
  updateHUD();
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  let heartsStr = '';
  for (let i = 0; i < lives; i++) heartsStr += '♥';
  for (let i = lives; i < 3; i++) heartsStr += '♡';
  document.getElementById('lives-display').textContent = heartsStr;
}

// Draw player ship
function drawPlayer() {
  ctx.save();
  ctx.shadowColor = '#00ff41';
  ctx.shadowBlur = 15;

  // Ship body
  ctx.fillStyle = '#00ff41';
  ctx.beginPath();
  ctx.moveTo(player.x + player.w / 2, player.y);
  ctx.lineTo(player.x + player.w, player.y + player.h);
  ctx.lineTo(player.x + player.w * 0.75, player.y + player.h * 0.75);
  ctx.lineTo(player.x + player.w * 0.25, player.y + player.h * 0.75);
  ctx.lineTo(player.x, player.y + player.h);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#88ffaa';
  ctx.beginPath();
  ctx.moveTo(player.x + player.w / 2, player.y + 10);
  ctx.lineTo(player.x + player.w * 0.6, player.y + player.h * 0.55);
  ctx.lineTo(player.x + player.w * 0.4, player.y + player.h * 0.55);
  ctx.closePath();
  ctx.fill();

  // Engine glow
  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#00aaff';
  const flicker = Math.random() * 6;
  ctx.fillRect(player.x + player.w * 0.35, player.y + player.h * 0.75, player.w * 0.3, 6 + flicker);

  ctx.restore();
}

// Draw enemy ship
function drawEnemy(e) {
  ctx.save();
  ctx.shadowColor = e.glow;
  ctx.shadowBlur = 12;
  ctx.fillStyle = e.color;

  if (e.name === 'scout') {
    ctx.beginPath();
    ctx.moveTo(e.x + e.w / 2, e.y + e.h);
    ctx.lineTo(e.x + e.w, e.y);
    ctx.lineTo(e.x, e.y);
    ctx.closePath();
    ctx.fill();
  } else if (e.name === 'fighter') {
    ctx.beginPath();
    ctx.moveTo(e.x + e.w / 2, e.y + e.h);
    ctx.lineTo(e.x + e.w, e.y + 5);
    ctx.lineTo(e.x + e.w * 0.7, e.y);
    ctx.lineTo(e.x + e.w * 0.3, e.y);
    ctx.lineTo(e.x, e.y + 5);
    ctx.closePath();
    ctx.fill();
  } else if (e.name === 'cruiser') {
    ctx.fillRect(e.x + 5, e.y, e.w - 10, e.h);
    ctx.fillRect(e.x, e.y + 10, e.w, e.h - 20);
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#ffffff55';
    ctx.fillRect(e.x + e.w / 2 - 4, e.y + e.h - 8, 8, 8);
  } else if (e.name === 'speeder') {
    ctx.beginPath();
    ctx.moveTo(e.x + e.w / 2, e.y + e.h);
    ctx.lineTo(e.x + e.w, e.y + e.h / 2);
    ctx.lineTo(e.x + e.w / 2, e.y);
    ctx.lineTo(e.x, e.y + e.h / 2);
    ctx.closePath();
    ctx.fill();
  } else if (e.name === 'tank') {
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0a0a1a';
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bar for enemies with hp > 1
  if (e.maxHp > 1) {
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#333';
    ctx.fillRect(e.x, e.y - 6, e.w, 3);
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / e.maxHp), 3);
  }

  ctx.restore();
}

// Spawn enemy
function spawnEnemy() {
  let typeIndex;
  const r = Math.random();
  if (difficulty < 3) {
    typeIndex = r < 0.5 ? 0 : (r < 0.8 ? 3 : 1);
  } else if (difficulty < 6) {
    typeIndex = r < 0.3 ? 0 : (r < 0.5 ? 3 : (r < 0.75 ? 1 : 2));
  } else {
    typeIndex = r < 0.2 ? 0 : (r < 0.35 ? 3 : (r < 0.55 ? 1 : (r < 0.8 ? 2 : 4)));
  }
  const type = enemyTypes[typeIndex];
  const speedMult = 1 + (difficulty - 1) * 0.08;
  enemies.push({
    x: Math.random() * (canvas.width - type.w),
    y: -type.h,
    w: type.w,
    h: type.h,
    speed: type.speed * speedMult,
    hp: type.hp,
    maxHp: type.hp,
    color: type.color,
    glow: type.glow,
    points: type.points,
    name: type.name,
    wobble: type.name === 'speeder' ? Math.random() * Math.PI * 2 : 0
  });
}

// Spawn particles (explosion)
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      size: Math.random() * 4 + 2,
      color
    });
  }
}

// Shoot
function shoot() {
  if (shootCooldown > 0) return;
  shootCooldown = 10;
  bullets.push({
    x: player.x + player.w / 2 - 2,
    y: player.y - 5,
    w: 4,
    h: 12,
    speed: 8,
    color: '#00ff41'
  });
}

// Collision detection
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// Update
function update() {
  // Player movement
  if (keys['ArrowLeft'] || keys['mLeft']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['mRight']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['mUp']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['mDown']) player.y += player.speed;

  // Clamp player
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

  // Shooting
  if (keys[' '] || keys['mFire']) shoot();
  if (shootCooldown > 0) shootCooldown--;

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= bullets[i].speed;
    if (bullets[i].y + bullets[i].h < 0) bullets.splice(i, 1);
  }

  // Update stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    s.brightness += (Math.random() - 0.5) * 0.1;
    s.brightness = Math.max(0.2, Math.min(1, s.brightness));
  }

  // Spawn enemies
  enemySpawnTimer++;
  const spawnRate = Math.max(20, 70 - difficulty * 5);
  if (enemySpawnTimer >= spawnRate) {
    enemySpawnTimer = 0;
    spawnEnemy();
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    if (e.name === 'speeder') {
      e.wobble += 0.1;
      e.x += Math.sin(e.wobble) * 2;
    }

    // Off screen
    if (e.y > canvas.height + 10) {
      enemies.splice(i, 1);
      continue;
    }

    // Bullet-enemy collision
    let hit = false;
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (rectsOverlap(bullets[j], e)) {
        bullets.splice(j, 1);
        e.hp--;
        spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 5);
        if (e.hp <= 0) {
          spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 20);
          score += e.points;
          enemies.splice(i, 1);
          hit = true;
          updateHUD();
        }
        break;
      }
    }
    if (hit) continue;

    // Player-enemy collision
    if (rectsOverlap({ x: player.x + 4, y: player.y + 4, w: player.w - 8, h: player.h - 8 }, e)) {
      spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 15);
      spawnExplosion(player.x + player.w / 2, player.y + player.h / 2, '#00ff41', 15);
      enemies.splice(i, 1);
      lives--;
      updateHUD();
      if (lives <= 0) {
        gameOver();
        return;
      }
      // Brief invincibility flash handled visually
      player.x = canvas.width / 2 - player.w / 2;
      player.y = canvas.height - player.h - 20;
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vx *= 0.98;
    p.vy *= 0.98;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Increase difficulty over time
  difficulty = 1 + Math.floor(score / 100);
}

// Draw
function draw() {
  // Clear
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  for (const s of stars) {
    const alpha = s.brightness * 0.8;
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }

  // Bullets
  ctx.save();
  ctx.shadowColor = '#00ff41';
  ctx.shadowBlur = 12;
  for (const b of bullets) {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Extra glow line
    ctx.fillStyle = '#aaffaa';
    ctx.fillRect(b.x + 1, b.y, 2, b.h);
  }
  ctx.restore();

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Player
  drawPlayer();

  // Particles
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// Game loop
function gameLoop() {
  if (!gameRunning) return;
  update();
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  resetGame();
  gameRunning = true;
  gameLoop();
}

function gameOver() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  document.getElementById('final-score').textContent = score;
  document.getElementById('game-over-screen').style.display = 'block';
}

// Input handling
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Mobile controls
function setupMobileBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
  el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
  el.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[key] = false; });
}
setupMobileBtn('btn-left', 'mLeft');
setupMobileBtn('btn-right', 'mRight');
setupMobileBtn('btn-up', 'mUp');
setupMobileBtn('btn-down', 'mDown');
setupMobileBtn('btn-fire', 'mFire');

// Buttons
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again-btn').addEventListener('click', startGame);

// Init stars for background even before game starts
initStars();
function bgDraw() {
  if (gameRunning) return;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    s.y += s.speed * 0.5;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    ctx.fillStyle = `rgba(255,255,255,${s.brightness * 0.5})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  requestAnimationFrame(bgDraw);
}
bgDraw();
</script>
</body>
</html>
