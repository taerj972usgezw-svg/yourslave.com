<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공룡 러너 - Dino Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  color: var(--accent);
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}
body.dark {
  --bg: #0a0a1a;
  --accent: #ffff00;
  --text: #ffff00;
  --overlay: rgba(10,10,26,0.7);
  --ground-detail: #ffff0066;
  --star-color: 255,255,200;
  --eye-bg: #0a0a1a;
  --canvas-border: #ffff0044;
  --canvas-shadow: #ffff0033;
  --canvas-inner: #ffff0011;
}
body.light {
  --bg: #e8eaf6;
  --accent: #b8a800;
  --text: #333366;
  --overlay: rgba(232,234,246,0.8);
  --ground-detail: #b8a80066;
  --star-color: 100,100,150;
  --eye-bg: #e8eaf6;
  --canvas-border: #b8a80066;
  --canvas-shadow: #b8a80033;
  --canvas-inner: #b8a80011;
}
#back-link {
  position: fixed;
  top: 16px;
  left: 16px;
  color: var(--accent);
  text-decoration: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  z-index: 100;
  text-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
  transition: color 0.2s;
}
#back-link:hover { color: #ffffff; text-shadow: 0 0 12px #fff, 0 0 24px var(--accent); }
#game-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  width: 100%;
  padding: 60px 16px 16px;
}
canvas {
  display: block;
  max-width: 100%;
  border: 2px solid var(--canvas-border);
  box-shadow: 0 0 20px var(--canvas-shadow), inset 0 0 20px var(--canvas-inner);
  border-radius: 4px;
}
#score-display {
  font-size: 14px;
  margin-bottom: 12px;
  text-shadow: 0 0 8px var(--accent);
  letter-spacing: 2px;
  color: var(--accent);
}
#controls {
  position: fixed;
  top: 16px;
  right: 16px;
  display: flex;
  gap: 8px;
  z-index: 100;
}
#controls button {
  background: none;
  border: 2px solid var(--accent);
  color: var(--accent);
  font-size: 20px;
  width: 40px;
  height: 40px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s;
  box-shadow: 0 0 8px var(--canvas-shadow);
}
#controls button:hover {
  background: var(--canvas-shadow);
}
</style>
</head>
<body class="dark">
<a id="back-link" href="../index.html">← 허브로 돌아가기</a>
<div id="controls">
  <button id="mute-btn" title="사운드 토글">🔊</button>
  <button id="theme-btn" title="테마 토글">🌙</button>
</div>
<div id="game-wrapper">
  <div id="score-display">점수: 0</div>
  <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const muteBtn = document.getElementById('mute-btn');
const themeBtn = document.getElementById('theme-btn');

// ============ Theme ============
let isDark = localStorage.getItem('arcade_theme') !== 'light';
function applyTheme() {
  document.body.className = isDark ? 'dark' : 'light';
  themeBtn.textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('arcade_theme', isDark ? 'dark' : 'light');
}
applyTheme();
themeBtn.addEventListener('click', () => {
  isDark = !isDark;
  applyTheme();
});

// ============ Sound (Web Audio API) ============
let audioCtx = null;
let soundEnabled = localStorage.getItem('arcade_sound') !== 'off';

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function updateMuteBtn() {
  muteBtn.textContent = soundEnabled ? '🔊' : '🔇';
}
updateMuteBtn();

muteBtn.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  localStorage.setItem('arcade_sound', soundEnabled ? 'on' : 'off');
  updateMuteBtn();
});

function playJumpSound() {
  if (!soundEnabled) return;
  ensureAudioCtx();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.12);
}

function playScoreSound() {
  if (!soundEnabled) return;
  ensureAudioCtx();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
  osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.25);
}

function playGameOverSound() {
  if (!soundEnabled) return;
  ensureAudioCtx();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.6);
}

// ============ Best Score ============
let bestScore = parseInt(localStorage.getItem('runner_best')) || 0;

function saveBestScore() {
  const current = Math.floor(score);
  if (current > bestScore) {
    bestScore = current;
    localStorage.setItem('runner_best', bestScore);
  }
}

// ============ Canvas Setup ============
const BASE_W = 800, BASE_H = 300;
let scale = 1;

function resize() {
  const maxW = Math.min(window.innerWidth - 32, 800);
  scale = maxW / BASE_W;
  canvas.width = BASE_W * scale;
  canvas.height = BASE_H * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Game state
const GROUND_Y = 240;
const GRAVITY = 0.7;
const JUMP_FORCE = -13.5;
const INITIAL_SPEED = 5;

let dino, obstacles, particles, stars, speed, score, gameOver, started, frameCount;
let lastMilestone = 0;

function initStars() {
  stars = [];
  for (let i = 0; i < 50; i++) {
    stars.push({
      x: Math.random() * BASE_W,
      y: Math.random() * (GROUND_Y - 40),
      size: Math.random() * 1.5 + 0.5,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function reset() {
  dino = { x: 60, y: GROUND_Y, w: 40, h: 46, vy: 0, onGround: true, frame: 0 };
  obstacles = [];
  particles = [];
  speed = INITIAL_SPEED;
  score = 0;
  gameOver = false;
  started = false;
  frameCount = 0;
  lastMilestone = 0;
  initStars();
}
reset();

// Input
function jump() {
  if (gameOver) { reset(); started = true; return; }
  if (!started) started = true;
  if (dino.onGround) {
    dino.vy = JUMP_FORCE;
    dino.onGround = false;
    playJumpSound();
  }
}
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

// Obstacle spawning
let spawnTimer = 0;
function spawnObstacle() {
  const type = Math.random();
  if (type < 0.6) {
    // Cactus
    const h = 30 + Math.random() * 25;
    obstacles.push({ type: 'cactus', x: BASE_W + 20, y: GROUND_Y - h, w: 18, h: h });
  } else if (type < 0.85) {
    // Double cactus
    const h = 25 + Math.random() * 20;
    obstacles.push({ type: 'cactus2', x: BASE_W + 20, y: GROUND_Y - h, w: 34, h: h });
  } else {
    // Bird
    const birdY = GROUND_Y - 50 - Math.random() * 60;
    obstacles.push({ type: 'bird', x: BASE_W + 20, y: birdY, w: 30, h: 20, frame: 0 });
  }
}

// Particles
function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 30,
      color
    });
  }
}

// Theme-aware colors
function getAccentColor() { return isDark ? '#ffff00' : '#b8a800'; }
function getCactusColor() { return isDark ? '#00ff88' : '#2e7d32'; }
function getBirdColor() { return isDark ? '#ff00ff' : '#9c27b0'; }
function getEyeBg() { return isDark ? '#0a0a1a' : '#e8eaf6'; }
function getGameOverColor() { return isDark ? '#ff0044' : '#c62828'; }
function getRestartColor() { return isDark ? '#00ffaa' : '#2e7d32'; }

// Drawing helpers
function neonGlow(color, blur) {
  ctx.shadowColor = color;
  ctx.shadowBlur = isDark ? blur : blur * 0.3;
}
function clearGlow() {
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

function drawDino() {
  const d = dino;
  const accent = getAccentColor();
  const eyeBg = getEyeBg();
  neonGlow(accent, 12);
  ctx.fillStyle = accent;

  // Body
  ctx.fillRect(d.x + 8, d.y, 24, 30);
  // Head
  ctx.fillRect(d.x + 16, d.y - 16, 24, 20);
  // Eye
  ctx.fillStyle = eyeBg;
  clearGlow();
  ctx.fillRect(d.x + 32, d.y - 12, 4, 4);
  // Mouth
  ctx.fillStyle = eyeBg;
  ctx.fillRect(d.x + 28, d.y - 2, 12, 2);

  neonGlow(accent, 12);
  ctx.fillStyle = accent;
  // Tail
  ctx.fillRect(d.x, d.y + 6, 12, 8);
  // Arms
  ctx.fillRect(d.x + 28, d.y + 14, 8, 4);

  // Legs (animated)
  if (d.onGround && started) {
    d.frame += 0.15 * speed;
    if (Math.floor(d.frame) % 2 === 0) {
      ctx.fillRect(d.x + 10, d.y + 28, 6, 18);
      ctx.fillRect(d.x + 24, d.y + 28, 6, 14);
    } else {
      ctx.fillRect(d.x + 10, d.y + 28, 6, 14);
      ctx.fillRect(d.x + 24, d.y + 28, 6, 18);
    }
  } else {
    // Tucked legs in air
    ctx.fillRect(d.x + 12, d.y + 28, 6, 10);
    ctx.fillRect(d.x + 22, d.y + 28, 6, 10);
  }
  clearGlow();
}

function drawCactus(o) {
  const color = getCactusColor();
  neonGlow(color, 10);
  ctx.fillStyle = color;
  // Trunk
  ctx.fillRect(o.x + o.w / 2 - 4, o.y, 8, o.h);
  if (o.type === 'cactus') {
    // Arms
    ctx.fillRect(o.x, o.y + o.h * 0.3, o.w, 6);
    ctx.fillRect(o.x, o.y + o.h * 0.3 - 10, 6, 12);
    ctx.fillRect(o.x + o.w - 6, o.y + o.h * 0.3 - 8, 6, 10);
  } else {
    // Double cactus
    ctx.fillRect(o.x, o.y, 8, o.h);
    ctx.fillRect(o.x + 26, o.y + 6, 8, o.h - 6);
    ctx.fillRect(o.x - 4, o.y + o.h * 0.4, 14, 6);
    ctx.fillRect(o.x + 24, o.y + o.h * 0.3, 14, 6);
  }
  clearGlow();
}

function drawBird(o) {
  const color = getBirdColor();
  const eyeBg = getEyeBg();
  neonGlow(color, 10);
  ctx.fillStyle = color;
  o.frame += 0.08;
  const wingUp = Math.sin(o.frame * 4) > 0;
  // Body
  ctx.fillRect(o.x + 4, o.y + 6, 22, 8);
  // Beak
  ctx.fillRect(o.x + 26, o.y + 8, 6, 4);
  // Wings
  if (wingUp) {
    ctx.fillRect(o.x + 8, o.y, 12, 8);
  } else {
    ctx.fillRect(o.x + 8, o.y + 12, 12, 8);
  }
  // Eye
  clearGlow();
  ctx.fillStyle = eyeBg;
  ctx.fillRect(o.x + 22, o.y + 7, 3, 3);
}

function drawGround() {
  const accent = getAccentColor();
  const detail = isDark ? '#ffff0066' : '#b8a80066';
  neonGlow(accent, 8);
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(BASE_W, GROUND_Y);
  ctx.stroke();

  // Ground details
  neonGlow(accent, 4);
  ctx.lineWidth = 1;
  ctx.strokeStyle = detail;
  const offset = (frameCount * speed * 0.5) % 40;
  for (let x = -offset; x < BASE_W; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 8);
    ctx.lineTo(x + 15, GROUND_Y + 8);
    ctx.stroke();
  }
  const offset2 = (frameCount * speed * 0.3) % 60;
  for (let x = 20 - offset2; x < BASE_W; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 16);
    ctx.lineTo(x + 8, GROUND_Y + 16);
    ctx.stroke();
  }
  clearGlow();
}

function drawStars() {
  const sc = isDark ? '255,255,200' : '100,100,150';
  stars.forEach(s => {
    const alpha = (isDark ? 0.4 : 0.25) + 0.3 * Math.sin(s.twinkle + frameCount * 0.03);
    ctx.fillStyle = `rgba(${sc},${alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / 30;
    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    neonGlow(p.color, 6);
    ctx.fillRect(p.x, p.y, 3, 3);
  });
  clearGlow();
}

function collides(a, b) {
  const pad = 6;
  return a.x + pad < b.x + b.w - pad &&
         a.x + a.w - pad > b.x + pad &&
         a.y + pad < b.y + b.h - pad &&
         a.y + a.h - pad > b.y + pad;
}

function drawGameOver() {
  const overlay = isDark ? 'rgba(10,10,26,0.7)' : 'rgba(232,234,246,0.8)';
  ctx.fillStyle = overlay;
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  const goColor = getGameOverColor();
  neonGlow(goColor, 20);
  ctx.fillStyle = goColor;
  ctx.font = '24px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('게임 오버', BASE_W / 2, 100);

  const accent = getAccentColor();
  neonGlow(accent, 12);
  ctx.fillStyle = accent;
  ctx.font = '16px "Press Start 2P"';
  ctx.fillText('점수: ' + Math.floor(score), BASE_W / 2, 140);

  ctx.font = '12px "Press Start 2P"';
  ctx.fillText('최고: ' + bestScore, BASE_W / 2, 165);

  const restartColor = getRestartColor();
  neonGlow(restartColor, 10);
  ctx.fillStyle = restartColor;
  ctx.font = '12px "Press Start 2P"';
  ctx.fillText('다시 하기: 스페이스 / 클릭', BASE_W / 2, 200);
  clearGlow();
  ctx.textAlign = 'left';
}

function drawStartScreen() {
  const accent = getAccentColor();
  neonGlow(accent, 14);
  ctx.fillStyle = accent;
  ctx.font = '18px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('공룡 러너', BASE_W / 2, 100);

  const restartColor = getRestartColor();
  ctx.font = '10px "Press Start 2P"';
  neonGlow(restartColor, 8);
  ctx.fillStyle = restartColor;
  ctx.fillText('스페이스 / 클릭으로 점프', BASE_W / 2, 140);
  ctx.fillText('시작하려면 누르세요!', BASE_W / 2, 165);

  if (bestScore > 0) {
    ctx.font = '10px "Press Start 2P"';
    neonGlow(accent, 8);
    ctx.fillStyle = accent;
    ctx.fillText('최고 점수: ' + bestScore, BASE_W / 2, 195);
  }

  clearGlow();
  ctx.textAlign = 'left';
}

function update() {
  if (!started || gameOver) return;

  frameCount++;

  // Speed increases over time
  speed = INITIAL_SPEED + frameCount * 0.001;
  score += speed * 0.02;
  scoreDisplay.textContent = '점수: ' + Math.floor(score) + '  최고: ' + bestScore;

  // Score milestone sound
  const currentMilestone = Math.floor(score / 100);
  if (currentMilestone > lastMilestone) {
    lastMilestone = currentMilestone;
    playScoreSound();
  }

  // Dino physics
  dino.vy += GRAVITY;
  dino.y += dino.vy;
  if (dino.y >= GROUND_Y) {
    dino.y = GROUND_Y;
    dino.vy = 0;
    dino.onGround = true;
  }

  // Spawn obstacles
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnObstacle();
    spawnTimer = Math.max(35, 100 - frameCount * 0.02) + Math.random() * 40;
  }

  // Move obstacles
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x + o.w > -20);

  // Collision
  const dinoBox = { x: dino.x + 4, y: dino.y - 16, w: 36, h: 56 };
  for (const o of obstacles) {
    if (collides(dinoBox, o)) {
      gameOver = true;
      saveBestScore();
      playGameOverSound();
      spawnParticles(dino.x + 20, dino.y + 10, 'rgb(255,255,0)');
      spawnParticles(dino.x + 20, dino.y + 10, 'rgb(255,0,68)');
      break;
    }
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  ctx.clearRect(0, 0, BASE_W, BASE_H);

  drawStars();
  drawGround();

  if (!started) {
    drawDino();
    drawStartScreen();
  } else {
    obstacles.forEach(o => {
      if (o.type === 'bird') drawBird(o);
      else drawCactus(o);
    });
    drawDino();
    drawParticles();
    if (gameOver) drawGameOver();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
