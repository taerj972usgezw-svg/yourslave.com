<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - Neon</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-color, #0a0a1a);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', cursive;
  overflow: hidden;
  transition: background 0.3s;
}
body.light-mode {
  --bg-color: #e8eaf6;
  --text-color: #880088;
  --text-glow: rgba(136,0,136,0.6);
  --overlay-bg: rgba(232,234,246,0.94);
  --star-color: rgba(100,100,140,0.4);
  --pipe-fill1: #c8b0d8;
  --pipe-fill2: #d8c0e8;
  --hud-color: #880088;
  --hint-color: #666;
  --best-color: #555;
  --score-overlay: #333;
  --canvas-bg: #e8eaf6;
  --eye-bg: #0a0a1a;
}
body:not(.light-mode) {
  --bg-color: #0a0a1a;
  --text-color: #ff00ff;
  --text-glow: #ff00ff;
  --overlay-bg: rgba(10,10,26,0.92);
  --star-color: rgba(255,255,255,0.5);
  --pipe-fill1: #1a0033;
  --pipe-fill2: #2a0050;
  --hud-color: #ff00ff;
  --hint-color: #888;
  --best-color: #aaa;
  --score-overlay: #fff;
  --canvas-bg: #0a0a1a;
  --eye-bg: #0a0a1a;
}
#top-bar {
  width: 100%;
  max-width: 480px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}
#top-bar a {
  color: var(--text-color);
  text-decoration: none;
  font-family: 'Press Start 2P', cursive;
  font-size: 10px;
  text-shadow: 0 0 8px var(--text-glow), 0 0 16px var(--text-glow);
  transition: text-shadow 0.2s;
}
#top-bar a:hover {
  text-shadow: 0 0 12px var(--text-glow), 0 0 24px var(--text-glow), 0 0 36px var(--text-glow);
}
#top-bar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
#score-display {
  color: var(--hud-color);
  font-size: 10px;
  text-shadow: 0 0 8px var(--text-glow), 0 0 16px var(--text-glow);
}
.toggle-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
  transition: transform 0.2s;
}
.toggle-btn:hover {
  transform: scale(1.2);
}
#game-wrapper {
  position: relative;
  width: 100%;
  max-width: 480px;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
canvas {
  display: block;
  border: 2px solid #ff00ff;
  box-shadow: 0 0 15px #ff00ff, 0 0 30px rgba(255,0,255,0.3), inset 0 0 15px rgba(255,0,255,0.1);
  border-radius: 4px;
}
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 5;
}
#overlay.active { pointer-events: auto; }
#overlay-content {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 30px;
  background: var(--overlay-bg);
  border: 2px solid #ff00ff;
  border-radius: 8px;
  box-shadow: 0 0 20px #ff00ff, 0 0 40px rgba(255,0,255,0.3);
}
#overlay.active #overlay-content { display: flex; }
#overlay-title {
  color: var(--text-color);
  font-size: 18px;
  text-shadow: 0 0 10px var(--text-glow), 0 0 20px var(--text-glow);
}
#overlay-score {
  color: var(--score-overlay);
  font-size: 12px;
  text-shadow: 0 0 6px rgba(255,255,255,0.5);
}
#overlay-best {
  color: var(--best-color);
  font-size: 10px;
}
#play-btn {
  font-family: 'Press Start 2P', cursive;
  font-size: 11px;
  padding: 14px 28px;
  background: transparent;
  color: #ff00ff;
  border: 2px solid #ff00ff;
  border-radius: 4px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff00ff, 0 0 20px rgba(255,0,255,0.3);
  transition: all 0.2s;
}
#play-btn:hover {
  background: rgba(255,0,255,0.15);
  box-shadow: 0 0 15px #ff00ff, 0 0 30px rgba(255,0,255,0.5);
}
#start-hint {
  color: var(--hint-color);
  font-size: 9px;
  text-align: center;
  line-height: 1.6;
}
</style>
</head>
<body>
<div id="top-bar">
  <a href="../index.html">&larr; 허브로 돌아가기</a>
  <div id="top-bar-right">
    <div id="score-display">점수: <span id="hud-score">0</span></div>
    <button class="toggle-btn" id="sound-toggle" title="사운드 토글">🔊</button>
    <button class="toggle-btn" id="theme-toggle" title="테마 토글">🌙</button>
  </div>
</div>
<div id="game-wrapper">
  <canvas id="game"></canvas>
  <div id="overlay" class="active">
    <div id="overlay-content">
      <div id="overlay-title">플래피 버드</div>
      <div id="overlay-score"></div>
      <div id="overlay-best"></div>
      <button id="play-btn">시작하기</button>
      <div id="start-hint">스페이스바 또는 클릭으로<br>새를 날려보세요!</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayScore = document.getElementById('overlay-score');
const overlayBest = document.getElementById('overlay-best');
const playBtn = document.getElementById('play-btn');
const startHint = document.getElementById('start-hint');
const hudScore = document.getElementById('hud-score');
const soundToggleBtn = document.getElementById('sound-toggle');
const themeToggleBtn = document.getElementById('theme-toggle');

// ── Theme ──
let isLightMode = localStorage.getItem('arcade_theme') === 'light';

function applyTheme() {
  document.body.classList.toggle('light-mode', isLightMode);
  themeToggleBtn.textContent = isLightMode ? '☀️' : '🌙';
}
applyTheme();

themeToggleBtn.addEventListener('click', e => {
  e.stopPropagation();
  isLightMode = !isLightMode;
  localStorage.setItem('arcade_theme', isLightMode ? 'light' : 'dark');
  applyTheme();
});

// Helper to read current CSS variable
function cssVar(name) {
  return getComputedStyle(document.body).getPropertyValue(name).trim();
}

// ── Sound (Web Audio API) ──
let audioCtx = null;
let soundEnabled = localStorage.getItem('arcade_sound') !== 'off';

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playTone(freq, duration, type, volumeEnd) {
  if (!soundEnabled) return;
  ensureAudioCtx();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (typeof volumeEnd === 'number') {
    osc.frequency.linearRampToValueAtTime(volumeEnd, audioCtx.currentTime + duration);
  }
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

function playFlapSound() {
  playTone(580, 0.08, 'square');
}

function playScoreSound() {
  if (!soundEnabled) return;
  ensureAudioCtx();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(520, now);
  osc.frequency.linearRampToValueAtTime(780, now + 0.12);
  gain.gain.setValueAtTime(0.1, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.18);
}

function playDieSound() {
  if (!soundEnabled) return;
  ensureAudioCtx();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(440, now);
  osc.frequency.linearRampToValueAtTime(120, now + 0.35);
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.4);
}

function updateSoundBtn() {
  soundToggleBtn.textContent = soundEnabled ? '🔊' : '🔇';
}
updateSoundBtn();

soundToggleBtn.addEventListener('click', e => {
  e.stopPropagation();
  soundEnabled = !soundEnabled;
  localStorage.setItem('arcade_sound', soundEnabled ? 'on' : 'off');
  updateSoundBtn();
});

// Canvas sizing
function resize() {
  const wrapper = document.getElementById('game-wrapper');
  const maxW = 480, maxH = 720;
  const w = Math.min(wrapper.clientWidth - 16, maxW);
  const h = Math.min(window.innerHeight - 80, maxH);
  canvas.width = w;
  canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

// Game constants
const GRAVITY = 0.45;
const JUMP_VEL = -7.5;
const PIPE_WIDTH = 52;
const PIPE_GAP = 150;
const PIPE_SPEED = 2.8;
const PIPE_SPAWN_INTERVAL = 1600;
const BIRD_SIZE = 20;

// Game state
let bird, pipes, score, bestScore, gameState, lastPipeTime, animFrame;
bestScore = parseInt(localStorage.getItem('flappy_best') || '0');

// Stars for background
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.5,
      a: Math.random() * 0.6 + 0.2,
      speed: Math.random() * 0.3 + 0.1
    });
  }
}

function init() {
  bird = {
    x: canvas.width * 0.25,
    y: canvas.height / 2,
    vy: 0,
    rotation: 0,
    flapFrame: 0
  };
  pipes = [];
  score = 0;
  lastPipeTime = 0;
  hudScore.textContent = '0';
  initStars();
}

function jump() {
  if (gameState === 'idle') {
    gameState = 'playing';
    overlay.classList.remove('active');
    bird.vy = JUMP_VEL;
    lastPipeTime = performance.now();
    playFlapSound();
  } else if (gameState === 'playing') {
    bird.vy = JUMP_VEL;
    playFlapSound();
  }
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
playBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (gameState === 'dead') {
    init();
    gameState = 'idle';
    overlayTitle.textContent = '플래피 버드';
    overlayScore.textContent = '';
    overlayBest.textContent = '';
    playBtn.textContent = '시작하기';
    startHint.style.display = '';
  }
  jump();
});

function spawnPipe(now) {
  const minTop = 60;
  const maxTop = canvas.height - PIPE_GAP - 60;
  const topH = Math.random() * (maxTop - minTop) + minTop;
  pipes.push({
    x: canvas.width,
    topH: topH,
    scored: false
  });
  lastPipeTime = now;
}

function update(now) {
  if (gameState !== 'playing') return;

  // Bird physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rotation = Math.min(Math.max(bird.vy * 3, -30), 70);
  bird.flapFrame += 0.15;

  // Spawn pipes
  if (now - lastPipeTime > PIPE_SPAWN_INTERVAL) {
    spawnPipe(now);
  }

  // Move pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= PIPE_SPEED;
    // Score
    if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < bird.x) {
      pipes[i].scored = true;
      score++;
      hudScore.textContent = score;
      playScoreSound();
    }
    // Remove off-screen
    if (pipes[i].x + PIPE_WIDTH < -10) {
      pipes.splice(i, 1);
    }
  }

  // Collision: ground/ceiling
  if (bird.y - BIRD_SIZE / 2 < 0 || bird.y + BIRD_SIZE / 2 > canvas.height) {
    die();
    return;
  }

  // Collision: pipes
  const bx = bird.x, by = bird.y, br = BIRD_SIZE / 2 - 2;
  for (const p of pipes) {
    if (bx + br > p.x && bx - br < p.x + PIPE_WIDTH) {
      if (by - br < p.topH || by + br > p.topH + PIPE_GAP) {
        die();
        return;
      }
    }
  }
}

function die() {
  gameState = 'dead';
  playDieSound();
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('flappy_best', bestScore);
  }
  overlayTitle.textContent = '게임 오버';
  overlayScore.textContent = '점수: ' + score;
  overlayBest.textContent = '최고 점수: ' + bestScore;
  playBtn.textContent = '다시 하기';
  startHint.style.display = 'none';
  overlay.classList.add('active');
}

// Drawing
function drawBg() {
  const bgColor = cssVar('--canvas-bg') || '#0a0a1a';
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  const starColor = isLightMode ? 'rgba(100,100,140,' : 'rgba(255,255,255,';
  for (const s of stars) {
    s.x -= s.speed;
    if (s.x < 0) { s.x = canvas.width; s.y = Math.random() * canvas.height; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = starColor + s.a + ')';
    ctx.fill();
  }

  // Ground line
  ctx.strokeStyle = '#ff00ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff00ff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height - 1);
  ctx.lineTo(canvas.width, canvas.height - 1);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Ceiling line
  ctx.beginPath();
  ctx.moveTo(0, 1);
  ctx.lineTo(canvas.width, 1);
  ctx.stroke();
}

function drawPipe(p) {
  const fill1 = cssVar('--pipe-fill1') || '#1a0033';
  const fill2 = cssVar('--pipe-fill2') || '#2a0050';

  const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
  grad.addColorStop(0, fill1);
  grad.addColorStop(0.5, fill2);
  grad.addColorStop(1, fill1);

  // Top pipe
  ctx.fillStyle = grad;
  ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH);
  // Bottom pipe
  ctx.fillRect(p.x, p.topH + PIPE_GAP, PIPE_WIDTH, canvas.height - p.topH - PIPE_GAP);

  // Neon borders
  ctx.shadowColor = '#ff00ff';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = '#ff00ff';
  ctx.lineWidth = 2;

  // Top pipe border
  ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.topH);
  // Top pipe cap
  ctx.fillStyle = fill2;
  ctx.fillRect(p.x - 4, p.topH - 16, PIPE_WIDTH + 8, 16);
  ctx.strokeRect(p.x - 4, p.topH - 16, PIPE_WIDTH + 8, 16);

  // Bottom pipe border
  ctx.strokeRect(p.x, p.topH + PIPE_GAP, PIPE_WIDTH, canvas.height - p.topH - PIPE_GAP);
  // Bottom pipe cap
  ctx.fillStyle = fill2;
  ctx.fillRect(p.x - 4, p.topH + PIPE_GAP, PIPE_WIDTH + 8, 16);
  ctx.strokeRect(p.x - 4, p.topH + PIPE_GAP, PIPE_WIDTH + 8, 16);

  ctx.shadowBlur = 0;
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation * Math.PI / 180);

  // Glow
  ctx.shadowColor = '#ff00ff';
  ctx.shadowBlur = 15;

  // Body
  ctx.fillStyle = '#ff00ff';
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_SIZE / 2 + 2, BIRD_SIZE / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Inner body
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ff44ff';
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_SIZE / 2 - 2, BIRD_SIZE / 2 - 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(6, -4, 4, 0, Math.PI * 2);
  ctx.fill();
  const eyeBg = isLightMode ? '#333' : '#0a0a1a';
  ctx.fillStyle = eyeBg;
  ctx.beginPath();
  ctx.arc(7, -4, 2, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.moveTo(BIRD_SIZE / 2 + 2, -2);
  ctx.lineTo(BIRD_SIZE / 2 + 10, 1);
  ctx.lineTo(BIRD_SIZE / 2 + 2, 4);
  ctx.closePath();
  ctx.fill();

  // Wing
  const wingY = Math.sin(bird.flapFrame * 6) * 4;
  ctx.fillStyle = '#cc00cc';
  ctx.beginPath();
  ctx.ellipse(-4, wingY + 2, 8, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function draw(now) {
  drawBg();
  for (const p of pipes) drawPipe(p);
  drawBird();
}

function loop(now) {
  update(now);
  draw(now);
  animFrame = requestAnimationFrame(loop);
}

// Start
gameState = 'idle';
init();
animFrame = requestAnimationFrame(loop);
</script>
</body>
</html>
